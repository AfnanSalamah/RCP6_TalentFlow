services:
  - type: web
    name: talentflow-backend-asoo
    runtime: python
    rootDir: 02_src/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers $WEB_CONCURRENCY --timeout 120
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
      - key: FRONTEND_URL
        value: https://talentflow-platform.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ALLOW_DEV_EMAIL_FALLBACK
        value: "false"
